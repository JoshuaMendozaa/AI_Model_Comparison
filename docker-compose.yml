services: # Define the services that make up your application

  api:  
    build: .  # Build the API service using the Dockerfile in the current directory
    ports:
      - "8000:8000" # Map port 8000 of the container to port 8000 on the host
    env_file: .env  # Load environment variables from the .env file
    depends_on: #tells Docker to start postgres/influxdb/redis before the api
      - postgres
      - influxdb
      - redis
    volumes:  #persists database data even if the container stops and allows live code updates
      - .:/app  # Mount the local app directory to /app in the container for live code updates

  postgres: 
    image: postgres:15  # Use the official PostgreSQL image version 15
    environment:  # Set environment variables for PostgreSQL using values from the .env file
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influx_data:/var/lib/influxdb2

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  influx_data: